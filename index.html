<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Diary</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <img class="paper-backdrop" src="assets/paper-ink-bg.png" alt="">
    <main class="app-shell">
      <section class="write-surface" aria-label="日記を書く">
        <header class="topbar">
          <div class="brand-block">
            <p id="dateLabel" class="date-label"></p>
            <h1>My Diary</h1>
          </div>
          <div class="toolbar">
            <button id="todayButton" class="quiet-button" type="button">今日</button>
            <button id="focusButton" class="icon-button" type="button" aria-pressed="false" aria-label="集中モード">
              <span aria-hidden="true">F</span>
            </button>
            <button id="exportButton" class="quiet-button" type="button">書き出し</button>
          </div>
        </header>

        <div class="composer-grid">
          <div class="editor-pane">
            <input
              id="titleInput"
              class="title-input"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="題名なしでもいい"
              aria-label="題名"
            >
            <textarea
              id="entryInput"
              class="entry-input"
              spellcheck="true"
              placeholder="今日のことを、気持ちよくほどいていく。"
              aria-label="本文"
            ></textarea>
            <div id="inkField" class="ink-field" aria-hidden="true"></div>
          </div>

          <aside class="pulse-panel" aria-label="今日の状態">
            <div class="status-line">
              <span id="saveStatus">保存済み</span>
              <time id="timeLabel" datetime=""></time>
            </div>

            <div class="score-ring" aria-label="文字数">
              <div>
                <strong id="charCount">0</strong>
                <span>字</span>
              </div>
            </div>

            <div class="flow-meter" aria-hidden="true">
              <span id="flowBar"></span>
            </div>

            <div class="mood-row" aria-label="気分">
              <button class="mood-swatch is-active" type="button" data-mood="moss" aria-label="深緑"></button>
              <button class="mood-swatch" type="button" data-mood="plum" aria-label="薄紅"></button>
              <button class="mood-swatch" type="button" data-mood="amber" aria-label="琥珀"></button>
              <button class="mood-swatch" type="button" data-mood="blue" aria-label="青"></button>
            </div>

            <div class="stat-grid">
              <div>
                <strong id="minutesCount">0</strong>
                <span>分</span>
              </div>
              <div>
                <strong id="lineCount">0</strong>
                <span>行</span>
              </div>
              <div>
                <strong id="streakCount">0</strong>
                <span>日</span>
              </div>
            </div>

            <p id="phraseLine" class="phrase-line">まだ白い</p>
          </aside>
        </div>
      </section>

      <section class="memory-strip" aria-label="過去の日記">
        <div class="section-head">
          <h2>Memory</h2>
          <button id="clearButton" class="quiet-button danger" type="button">今日を空にする</button>
        </div>
        <div id="entryList" class="entry-list"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js"></script>
  </body>
</html>
